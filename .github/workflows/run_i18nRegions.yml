# This is a basic workflow to help you get started with Actions

name: run_i18nRegions

# Controls when the action will run. 
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [ main ]
  schedule:
    - cron: '*/5 * * * *'

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v2
      - name: Set up Python 3.8
        uses: actions/setup-python@v2
        with:
          python-verison: '3.8'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: Run YouTube Available Regions scraper
        env:
          YOUTUBE_DATA_API_KEY_FOR_GITHUB_1: ${{ secrets.YOUTUBE_DATA_API_KEY_FOR_GITHUB_1 }}
        run: |
          python i18nRegions.py 
      - name: Commit and push
        run: |-
         git diff
         git config --global user.email "i18nRegions-bot@example.com"
         git config --global user.name "i18nRegions-bot"
         git diff --quiet || (git add i18nRegions_list.json && git commit -m "Updated with latest list of countires YouTube in available in." 
         git push origin HEAD:main 
